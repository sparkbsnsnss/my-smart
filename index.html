<body class="text-vintage-dark min-h-screen flex flex-col pb-20">

    <!-- Navigation Header -->
    <nav class="sticky top-0 z-50 bg-vintage-paper/95 backdrop-blur-sm border-b border-vintage-bordeaux/10 px-4 py-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-display text-2xl italic text-vintage-bordeaux font-bold tracking-tight">Codex</h1>
            <div class="flex gap-6 text-[11px] uppercase tracking-[0.2em] font-bold opacity-60">
                <button onclick="showTab('search')" id="btn-search" class="tab-active transition-all">Поиск</button>
                <button onclick="showTab('shelf')" id="btn-shelf" class="transition-all">Полка</button>
                <button onclick="showTab('recs')" id="btn-recs" class="transition-all">Советы</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 mt-4">
        
        <!-- Search Section -->
        <section id="view-search" class="space-y-8">
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="query" onkeyup="handleSearch(event)" placeholder="Найти любую книгу в мире..." 
                    class="w-full bg-transparent border-b-2 border-vintage-indigo/20 focus:border-vintage-bordeaux outline-none py-4 px-2 text-2xl italic transition-all placeholder:opacity-20">
                <div id="search-indicator" class="hidden absolute right-2 top-6 loader"></div>
            </div>
            
            <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
                <!-- Search results -->
            </div>
        </section>

        <!-- Shelf Section -->
        <section id="view-shelf" class="hidden space-y-6">
            <h2 class="font-display text-3xl italic text-vintage-bordeaux border-b border-vintage-bordeaux/10 pb-4 text-center sm:text-left">Мой Архив</h2>
            <div id="shelf-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
                <!-- Saved items -->
            </div>
        </section>

        <!-- Recommendations Section -->
        <section id="view-recs" class="hidden space-y-6">
            <div class="bg-vintage-bordeaux/5 p-6 rounded-xl border border-vintage-bordeaux/10 text-center sm:text-left">
                <h2 class="font-display text-3xl italic text-vintage-bordeaux mb-2">Для вас</h2>
                <p id="recs-status" class="text-sm opacity-60 italic tracking-wide">Добавьте книги, чтобы мы поняли ваш вкус</p>
            </div>
            <div id="recs-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">
                <!-- Recs -->
            </div>
        </section>

    </main>

    <script>
        let myLibrary = JSON.parse(localStorage.getItem('codex_pro_v1')) || [];
        
        async function searchBooks(q) {
            if (!q || q.length < 2) return;
            const loader = document.getElementById('search-indicator');
            loader.classList.remove('hidden');
            
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=24&printType=books`);
                const data = await res.json();
                renderBooks('results', data.items || []);
            } catch (err) {
                console.error(err);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function handleSearch(e) {
            if (e.key === 'Enter') searchBooks(e.target.value);
        }

        function renderBooks(containerId, books, isShelf = false) {
            const container = document.getElementById(containerId);
            if (!books || books.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center py-10 opacity-30 italic">Ничего не найдено</p>';
                return;
            }

            container.innerHTML = books.map(b => {
                const info = b.volumeInfo || b;
                const id = b.id;
                const thumb = info.imageLinks?.thumbnail || `https://via.placeholder.com/300x450?text=No+Cover`;
                const isSaved = myLibrary.some(item => item.id === id);
                
                return `
                    <div class="book-card bg-white/40 p-3 rounded-lg shadow-sm border border-vintage-indigo/5 flex flex-col h-full overflow-hidden">
                        <div class="relative aspect-[2/3] mb-4 overflow-hidden rounded shadow-md">
                            <img src="${thumb.replace('http:', 'https:')}" class="w-full h-full object-cover" loading="lazy">
                        </div>
                        <h3 class="text-sm font-bold leading-tight line-clamp-2 mb-1 min-h-[2.5rem]">${info.title}</h3>
                        <p class="text-[10px] opacity-60 italic mb-4 line-clamp-1">${info.authors?.join(', ') || 'Автор не указан'}</p>
                        
                        <div class="mt-auto pt-2">
                            ${isShelf 
                                ? `<button onclick="removeBook('${id}')" class="w-full text-[10px] uppercase font-bold text-vintage-bordeaux py-2 border border-vintage-bordeaux/20 rounded hover:bg-vintage-bordeaux hover:text-vintage-paper transition-all">Удалить</button>`
                                : isSaved 
                                    ? `<div class="text-center text-[10px] font-bold text-vintage-indigo py-2 bg-vintage-indigo/10 rounded uppercase tracking-widest">На полке</div>`
                                    : `<button onclick="saveBook('${id}', '${encodeURIComponent(JSON.stringify(info))}')" class="w-full bg-vintage-bordeaux text-white text-[10px] py-2 rounded font-bold uppercase tracking-widest shadow-md active:scale-95 transition-all">В архив</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        function saveBook(id, infoStr) {
            const info = JSON.parse(decodeURIComponent(infoStr));
            if (myLibrary.some(b => b.id === id)) return;
            myLibrary.push({ id, ...info });
            localStorage.setItem('codex_pro_v1', JSON.stringify(myLibrary));
            searchBooks(document.getElementById('query').value);
            showToast("Книга добавлена");
        }

        function removeBook(id) {
            myLibrary = myLibrary.filter(b => b.id !== id);
            localStorage.setItem('codex_pro_v1', JSON.stringify(myLibrary));
            renderMyShelf();
            showToast("Книга удалена");
        }

        function renderMyShelf() {
            renderBooks('shelf-list', myLibrary, true);
        }

        async function getRecommendations() {
            const list = document.getElementById('recs-list');
            if (myLibrary.length === 0) {
                list.innerHTML = '<p class="col-span-full text-center py-10 opacity-30 italic">Сначала добавьте книги на полку</p>';
                return;
            }

            list.innerHTML = '<div class="col-span-full py-10 flex justify-center"><div class="loader"></div></div>';
            
            const cats = myLibrary.flatMap(b => b.categories || []);
            const seed = cats.length > 0 ? cats[Math.floor(Math.random()*cats.length)] : myLibrary[0].authors[0];
            
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=subject:${encodeURIComponent(seed)}&maxResults=12`);
                const data = await res.json();
                document.getElementById('recs-status').innerText = `На основе вашего интереса к: ${seed}`;
                const filtered = (data.items || []).filter(b => !myLibrary.some(m => m.id === b.id));
                renderBooks('recs-list', filtered);
            } catch(e) {
                list.innerHTML = "Ошибка подбора";
            }
        }

        function showTab(tab) {
            ['search', 'shelf', 'recs'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`btn-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
            
            if (tab === 'shelf') renderMyShelf();
            if (tab === 'recs') getRecommendations();
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-vintage-dark text-vintage-paper px-8 py-3 rounded-full text-xs shadow-2xl z-[100] animate-bounce";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        // Generate PWA manifest dynamically
        const manifest = {
            name: "Codex Smart Library",
            short_name: "Codex",
            start_url: ".",
            display: "standalone",
            background_color: "#F4EBD0",
            theme_color: "#800020",
            icons: [{
                src: "data:image/svg+xml;base64," + btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="120" fill="#800020"/><text x="50%" y="65%" fill="#F4EBD0" font-family="serif" font-size="320" text-anchor="middle" font-style="italic">C</text></svg>'),
                sizes: "512x512",
                type: "image/svg+xml"
            }]
        };
        const mUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}));
        document.getElementById('manifest-link').href = mUrl;
    </script>
</body>
</html>
