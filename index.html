```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=EB+Garamond&display=swap');
        body { background-color: #F4EBD0; font-family: 'EB Garamond', serif; color: #1A1A1A; margin: 0; padding: 0; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .book-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(128,0,32,0.1); display: flex; flex-direction: column; }
    </style>
</head>
<body class="p-5 flex flex-col items-center">

    <div class="w-full max-w-md">
        <header class="text-center mb-10 mt-6">
            <h1 class="text-5xl serif-title text-[#800020] mb-2">Codex</h1>
            <p class="text-[10px] uppercase tracking-[0.5em] opacity-40 font-bold text-[#800020]">Digital Archive</p>
        </header>

        <div class="flex flex-col gap-4 mb-10">
            <input type="text" id="searchInput" placeholder="Название или автор..." 
                class="w-full p-5 rounded-2xl border-none outline-none bg-white shadow-lg text-lg italic pr-12 text-[#800020]">
            <button onclick="searchBooks()" 
                class="w-full bg-[#800020] text-[#F4EBD0] py-5 rounded-2xl font-bold shadow-2xl uppercase tracking-widest text-sm active:scale-95 transition-transform">
                Найти
            </button>
        </div>

        <div id="loader" class="hidden text-center py-10 italic opacity-50 text-[#800020]">Листаем страницы...</div>
        <div id="results" class="grid grid-cols-2 gap-4 pb-20"></div>
    </div>

    <script>
        async function searchBooks() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            const resDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            resDiv.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=20`);
                const data = await response.json();
                loader.classList.add('hidden');

                if (!data.items) {
                    resDiv.innerHTML = '<p class="col-span-2 text-center py-10 opacity-50">Книги не найдены</p>';
                    return;
                }

                data.items.forEach(book => {
                    const info = book.volumeInfo;
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    let img = info.imageLinks ? info.imageLinks.thumbnail : 'https://via.placeholder.com/150x220/e2e2e2/666666?text=No+Cover';
                    img = img.replace('http:', 'https:');
                    
                    card.innerHTML = `
                        <img src="${img}" class="w-full aspect-[2/3] object-cover rounded-lg mb-3 shadow-md">
                        <h3 class="text-[11px] font-bold line-clamp-2 leading-tight h-8">${info.title}</h3>
                        <p class="text-[9px] opacity-60 mt-1 italic">${info.authors ? info.authors[0] : 'Unknown'}</p>
                    `;
                    resDiv.appendChild(card);
                });
            } catch (e) {
                loader.classList.add('hidden');
                alert('Ошибка сети');
            }
        }
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBooks(); });
    </script>
</body>
</html>
