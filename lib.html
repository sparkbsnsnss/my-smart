```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex: Архив</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #F4EBD0; 
            font-family: serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .book-card {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
    </style>
</head>
<body class="p-5 flex flex-col items-center">

    <div class="w-full max-w-sm">
        <header class="text-center mb-8 mt-4">
            <h1 class="text-5xl font-bold text-[#800020] mb-2">Codex</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-50 font-bold">Digital Archive</p>
        </header>

        <div class="flex flex-col gap-3 mb-8">
            <input type="text" id="bookSearch" placeholder="Название книги..." 
                class="w-full p-5 rounded-2xl border-2 border-[#800020]/10 outline-none focus:border-[#800020] bg-white text-lg italic">
            <button onclick="startSearch()" 
                class="w-full bg-[#800020] text-white py-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">
                Найти в базе
            </button>
        </div>

        <div id="loader" class="hidden text-center py-10 italic opacity-40">Ищем в архивах...</div>
        <div id="results" class="grid grid-cols-2 gap-4">
            <!-- Книги появятся здесь -->
        </div>
    </div>

    <script>
        async function startSearch() {
            const query = document.getElementById('bookSearch').value.trim();
            if (!query) return;

            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            resultsDiv.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=14&printType=books`);
                const data = await response.json();
                
                loader.classList.add('hidden');

                if (!data.items) {
                    resultsDiv.innerHTML = '<p class="col-span-2 text-center py-10 opacity-40 italic">Ничего не найдено</p>';
                    return;
                }

                data.items.forEach(book => {
                    const info = book.volumeInfo;
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    let img = info.imageLinks ? info.imageLinks.thumbnail : 'https://via.placeholder.com/150x225?text=No+Cover';
                    img = img.replace('http:', 'https:');
                    
                    card.innerHTML = `
                        <img src="${img}" class="w-full aspect-[2/3] object-cover rounded-lg mb-3 shadow-sm">
                        <h3 class="text-[10px] font-bold line-clamp-2 leading-tight flex-1 text-[#1A1A1A]">${info.title}</h3>
                        <p class="text-[8px] opacity-50 mt-1 italic">${info.authors ? info.authors[0] : ''}</p>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                loader.classList.add('hidden');
                alert('Ошибка: проверьте интернет');
            }
        }

        // Поиск по нажатию Enter
        document.getElementById('bookSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
