```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F4EBD0; font-family: serif; }
        .card { background: white; border-radius: 15px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-5 flex flex-col items-center min-h-screen text-[#1A1A1A]">

    <div class="w-full max-w-sm">
        <!-- Заголовок -->
        <header class="text-center mb-8 mt-4">
            <h1 class="text-5xl font-bold text-[#800020] mb-1">Codex</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] opacity-40 font-bold">World Archive</p>
        </header>

        <!-- Поиск -->
        <div class="flex flex-col gap-3 mb-8">
            <input type="text" id="findBox" placeholder="Название или автор..." 
                class="w-full p-5 rounded-2xl border-2 border-[#800020]/10 outline-none focus:border-[#800020] bg-white text-lg shadow-inner">
            <button onclick="start()" 
                class="w-full bg-[#800020] text-white py-5 rounded-2xl font-bold shadow-xl uppercase tracking-widest active:opacity-80 transition-all">
                Найти
            </button>
        </div>

        <!-- Состояния -->
        <div id="ld" class="hidden text-center py-10 italic opacity-50 text-sm">Листаем фолианты...</div>
        
        <!-- Сетка результатов -->
        <div id="box" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        async function start() {
            const q = document.getElementById('findBox').value.trim();
            if (!q) return;
            
            const box = document.getElementById('box');
            const ld = document.getElementById('ld');
            
            box.innerHTML = '';
            ld.classList.remove('hidden');

            try {
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=16&printType=books`);
                const data = await response.json();
                ld.classList.add('hidden');

                if (!data.items) {
                    box.innerHTML = '<p class="col-span-2 text-center py-10 opacity-40">Ничего не найдено</p>';
                    return;
                }

                data.items.forEach(book => {
                    const info = book.volumeInfo;
                    const card = document.createElement('div');
                    card.className = 'card flex flex-col h-full';
                    
                    let img = info.imageLinks ? info.imageLinks.thumbnail : 'https://via.placeholder.com/150x225?text=No+Cover';
                    img = img.replace('http:', 'https:');
                    
                    card.innerHTML = `
                        <img src="${img}" class="w-full aspect-[2/3] object-cover rounded-lg mb-3 shadow-md border">
                        <h3 class="text-[11px] font-bold line-clamp-2 leading-tight flex-1">${info.title}</h3>
                        <p class="text-[9px] opacity-50 mt-1 italic line-clamp-1">${info.authors ? info.authors[0] : ''}</p>
                    `;
                    box.appendChild(card);
                });
            } catch (err) {
                ld.classList.add('hidden');
                alert('Проверьте интернет');
            }
        }

        // Поиск по кнопке Enter
        document.getElementById('findBox').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') start();
        });
    </script>

</body>
</html>
